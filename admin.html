<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Sai Krishna Cycle Store</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Syne:wght@600;700;800&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E8CYEJT2SV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E8CYEJT2SV');
    </script>
</head>
<body class="admin-body">

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">Sai Krishna Cycle Store</div>
        <div class="hamburger" id="hamburger">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html#bikes">Bikes</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="admin.html" class="active">Admin</a></li>
        </ul>
    </nav>

    <!-- Admin Dashboard Main List -->
    <!-- Login Overlay -->
    <div id="login-overlay" class="modern-login-overlay">
        <div class="modern-login-card">
            <div class="login-header">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom: 15px; color: #3b82f6; filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5));"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <h2>Welcome Back</h2>
                <p>Sign in to access the secure admin portal</p>
            </div>
            <form id="login-form" class="modern-login-form">
                <div class="modern-input-group">
                    <input type="text" id="login-email" required placeholder=" ">
                    <label>Username</label>
                </div>
                <div class="modern-input-group">
                    <input type="password" id="login-password" required placeholder=" ">
                    <label>Password</label>
                </div>
                <p id="login-error" class="login-error-msg"></p>
                <button type="submit" class="modern-login-btn">Secure Sign In</button>
            </form>
        </div>
    </div>

    <section class="admin-dashboard" id="admin-dashboard" style="display: none;">
        <div class="admin-container">
            <div class="admin-header-flex">
                <div>
                    <h2>Product Catalog</h2>
                    <p>Manage all bicycles in your store.</p>
                </div>
                <div style="display: flex; gap: 15px;">
                    <a href="index.html" class="btn" style="background-color: #f3f4f6; color: #1f2937; text-decoration: none; border: 1px solid #d1d5db; display: flex; align-items: center;">&larr; Return to Home</a>
                    <button id="btn-open-add" class="btn btn-primary">+ Add New Bicycle</button>
                    <button id="btn-logout" class="btn" style="background-color: #ef4444; color: #fff; border: none; cursor: pointer;">Logout</button>
                </div>
            </div>
            
            <div class="admin-product-list" id="admin-product-list">
                <!-- Products list injected by JS -->
            </div>
        </div>
    </section>

    <!-- Add/Edit Form Modal -->
    <div id="admin-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add New Bicycle</h3>
                <button id="btn-close-modal" class="btn-close">&times;</button>
            </div>
            
            <form id="add-cycle-form" class="admin-form">
                <input type="hidden" id="cycle-id" value="">
                
                <!-- Image Upload -->
                <div class="form-group">
                    <label for="cycle-image">Bicycle Image</label>
                    <div class="image-upload-wrapper">
                        <input type="file" id="cycle-image" accept="image/*">
                        <div class="upload-placeholder" id="upload-placeholder">
                            <span>+ Click to Upload Image</span>
                        </div>
                        <img id="image-preview" src="" alt="Preview" style="display: none;">
                    </div>
                    <p class="img-hint" id="img-hint" style="display:none; font-size: 0.8rem; color: #666; margin-top:5px;">Leave empty to keep current image.</p>
                </div>

                <!-- Product Name -->
                <div class="form-group">
                    <label for="cycle-name">Bicycle Name</label>
                    <input type="text" id="cycle-name" placeholder="e.g. Mountain Explorer 3000" required>
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label for="cycle-desc">Description</label>
                    <textarea id="cycle-desc" rows="3" placeholder="A short description of the bicycle..." required></textarea>
                </div>

                <!-- Stock Status -->
                <div class="form-group">
                    <label for="cycle-status">Stock Status</label>
                    <select id="cycle-status" class="form-control" style="width: 100%; padding: 12px; border: 1px solid #e4e4e7; border-radius: 8px; outline: none; font-family: inherit;">
                        <option value="true">In Stock</option>
                        <option value="false">Out of Stock</option>
                    </select>
                </div>

                <!-- Sizes & Prices -->
                <div class="form-group">
                    <label>Available Sizes & Prices</label>
                    <div class="size-price-group">
                        <div class="size-price-item">
                            <label class="custom-checkbox">
                                <input type="checkbox" name="sizes" value='14"' class="size-toggle">
                                <span class="checkmark">14"</span>
                            </label>
                            <input type="number" id="price-14" placeholder="Price (₹)" class="size-price-input" disabled>
                        </div>
                        <div class="size-price-item">
                            <label class="custom-checkbox">
                                <input type="checkbox" name="sizes" value='16"' class="size-toggle">
                                <span class="checkmark">16"</span>
                            </label>
                            <input type="number" id="price-16" placeholder="Price (₹)" class="size-price-input" disabled>
                        </div>
                        <div class="size-price-item">
                            <label class="custom-checkbox">
                                <input type="checkbox" name="sizes" value='20"' class="size-toggle">
                                <span class="checkmark">20"</span>
                            </label>
                            <input type="number" id="price-20" placeholder="Price (₹)" class="size-price-input" disabled>
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary btn-submit" id="modal-submit-btn">Save Product</button>
            </form>
        </div>
    </div>

    <!-- Interactive script -->
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
